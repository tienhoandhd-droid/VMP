name: Deploy VMP Monitor to GitHub Pages

on:
  # Tự chạy mỗi khi push lên nhánh chính
  push:
    branches: ["main"]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

# Quyền cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mỗi lần chỉ chạy 1 deploy; deploy mới sẽ thay deploy đang chạy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_VMP_READ_URL: ${{ vars.VITE_VMP_READ_URL }}
          VITE_VMP_WRITE_URL: ${{ vars.VITE_VMP_WRITE_URL }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON: ${{ vars.VITE_SUPABASE_ANON }}
          VITE_TEMP_ADMIN_PASS: ${{ secrets.VITE_TEMP_ADMIN_PASS }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
